name: Daily Stock Data Pipeline

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_twelve_data.txt

    - name: Run Market Analysis
      env:
        TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      run: python run_analysis.py

    - name: Force Daily Update Timestamp
      run: |
        mkdir -p data
        date -u +"%Y-%m-%dT%H:%M:%SZ" > data/last_update.txt

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 chore: update daily market predictions"
        commit_user_name: "Subham Sadangi"
        commit_user_email: "subhamsadangi1576@gmail.com"
        commit_author: "Subham Sadangi <subhamsadangi1576@gmail.com>"
        file_pattern: "data/*"
        branch: main
